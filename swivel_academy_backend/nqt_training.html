<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swivel IT | Training Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="assets/images/logo_white.png" alt="Swivel IT Logo" height="80">
            </a>

            <div class="profile-wrapper">
                <div class="profile-icon" onclick="toggleProfileMenu()">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                </div>

                <div class="profile-menu" id="profileMenu">
                    <div class="profile-header">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                        <div>
                            <h6 class="mb-0">User</h6>
                            <small id="userEmail">user@email.com</small><br>
                            <small id="userRoleText">Student</small>
                        </div>
                    </div>
                    <hr>
                    <button class="profile-logout" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">

        <!-- LIVE MEET -->
        <div class="card p-4 mb-4">
            <h4>🔴 Live Training Session</h4>
            <a href="https://meet.google.com/grn-asnk-bnn" target="_blank" class="btn btn-primary">
                Join Google Meet
            </a>
        </div>

        <!-- UPLOAD (Trainer / Admin only) -->
        <div class="card p-4 mb-4" id="trainerUploadSection">
            <h4>🎬 Upload Recorded Session</h4>

            <form id="uploadForm">
                <input type="text" id="title" class="form-control mb-2" placeholder="Session Name" required>
                <input type="file" id="video" class="form-control mb-2" accept="video/*" required>
                <button class="btn btn-success w-100">Upload Video</button>
            </form>
        </div>

        <!-- RECORDED VIDEOS -->
        <div class="card p-4">
            <h4>🎥 Recorded Sessions</h4>
            <div id="videosContainer" class="row"></div>
        </div>

    </div>

    <script src="assets/js/nqt_training.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
