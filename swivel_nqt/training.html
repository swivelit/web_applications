<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swivel IT | Training Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="assets/images/logo.jpeg" alt="Swivel IT Logo" height="70">
            </a>

            <div class="profile-wrapper">
                <div class="profile-icon" onclick="toggleProfileMenu()">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="40">
                </div>

                <div class="profile-menu" id="profileMenu">
                    <div class="profile-header">
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="50">
                        <div>
                            <h6 class="mb-0">User</h6>
                            <small id="userEmail">user@email.com</small><br>
                            <small id="userRoleText">Student</small>
                        </div>
                    </div>
                    <hr>
                    <button class="profile-logout btn btn-danger w-100" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </div>
    </nav>
    <!-- ========================================== -->



    <!-- ================= CONTENT ================= -->
    <div class="container py-5">

        <!-- ===== ENQUIRY SECTION (FIRST TIME STUDENT) ===== -->
        <div id="enquirySection" class="card p-4 mb-4 d-none">
            <h4 class="mb-3">📚 Course Enquiry</h4>

            <form id="enquiryForm">
                <label class="mb-2">Select Course</label>
                <select id="courseSelect" class="form-control mb-3" required>
                    <option value="">-- Choose Course --</option>
                </select>

                <button class="btn btn-primary w-100">
                    Submit Enquiry
                </button>
            </form>
        </div>



        <!-- ===== TRAINING SECTION (AFTER ENQUIRY) ===== -->
        <div id="trainingSection" class="d-none">

            <!-- LIVE SESSION -->
            <div class="card p-4 mb-4">
                <h4>🔴 Live Training Session</h4>
                <a id="meetLink" target="_blank" class="btn btn-success mt-3">
                    Join Google Meet
                </a>
            </div>

            <!-- RECORDED SESSIONS -->
            <div class="card p-4">
                <h4>🎥 Recorded Sessions</h4>
                <div id="videosContainer" class="row"></div>
            </div>

        </div>

    </div>
    <!-- ========================================== -->



    <!-- ================= FOOTER ================= -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">© 2026 Swivel IT. All Rights Reserved.</p>
    </footer>
    <!-- ========================================== -->



    <!-- Scripts -->
    <script src="assets/js/training.js"></script>
    <script src="assets/js/script.js"></script>

</body>
</html>
