<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swivel IT | Training Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>

<body>

     <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container d-flex justify-content-between">
      <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <img src="assets/images/logo_white.png" alt="Swivel IT Logo" height="80">
      </a>
      <div class="profile-wrapper">
        <div class="profile-icon" onclick="toggleProfileMenu()">
          <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
        </div>

        <div class="profile-menu" id="profileMenu">
          <div class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <div>
              <h6 class="mb-0" id="profileName">Student</h6>
              <small><a href="add_course.html" id="addCourseLink">Add Course</a></small>
              <small id="profileEmail">swivelit@exam.com</small>
              <small id="profileScore" style="display:none;">Score 0/0</small>
            </div>
          </div>

          <hr>

          <button class="profile-logout" onclick="logout()">
            🚪 Logout
          </button>
        </div>
      </div>
    </div>
  </nav>


    <div class="container py-5">

        <!-- ENQUIRY -->
        <div id="enquirySection" class="card p-4 mb-4 d-none">
            <h4>📚 Course Enquiry</h4>

            <form id="enquiryForm">

                <label>Select Course</label>
                <select id="courseSelect" class="form-control mb-3" required>
                    <option value="">-- Choose Course --</option>
                </select>

                <!-- COURSE DETAILS -->
                <div id="courseDetails" class="mt-3 d-none">
                    <p><strong>Trainer:</strong> <span id="trainerName"></span></p>
                    <p><strong>Email:</strong> <span id="trainerEmail"></span></p>
                    <p><strong>Fee:</strong> ₹<span id="courseFee"></span></p>
                </div>

                <button class="btn btn-primary w-100 mt-3">
                    Submit Enquiry
                </button>

            </form>
        </div>


        <!-- TRAINING -->
        <div id="trainingSection" class="d-none">

            <div class="card p-4 mb-4">
                <h4>🔴 Live Training</h4>
                <a id="meetLink" target="_blank" class="btn btn-success mt-3">
                    Join Google Meet
                </a>
            </div>

            <div class="card p-4">
                <h4>🎥 Recorded Sessions</h4>
                <div id="videosContainer" class="row"></div>
            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <p>© 2026 Swivel IT</p>
    </footer>

    <script src="assets/js/training.js"></script>
    <script src="assets/js/script.js"></script>

</body>
</html>
